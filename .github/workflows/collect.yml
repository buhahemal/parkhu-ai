name: Parkhu Daily Data Collection

# 08:00 AM IST == 02:30 UTC
on:
  schedule:
    - cron: "30 2 * * 1-5"   # Mon–Fri, pre-market IST
  workflow_dispatch: {}       # allow manual runs from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write             # needed to commit the day's output back

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Parkhu Data Collector
        run: python run.py

      - name: Commit collected data
        run: |
          git config user.name  "parkhu-bot"
          git config user.email "parkhu-bot@users.noreply.github.com"
          git add output/ logs/ || true
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: daily collection $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Publish output links
        if: always()
        run: |
          DATE="${PARKHU_RUN_DATE:-$(TZ=Asia/Kolkata date +%Y-%m-%d)}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          BASE_RAW="https://raw.githubusercontent.com/${REPO}/${BRANCH}"
          BASE_BLOB="https://github.com/${REPO}/blob/${BRANCH}"
          OUT_DIR="output/${DATE}"

          {
            echo "## Parkhu Data — ${DATE}"
            echo ""
            echo "Public links to today's collected files (branch \`${BRANCH}\`):"
            echo ""
            echo "**Folder:** [${OUT_DIR}/](${BASE_BLOB}/${OUT_DIR}/)"
            echo ""
            echo "| File | Raw (direct) | Browse |"
            echo "|------|--------------|--------|"
            if [ -d "$OUT_DIR" ]; then
              find "$OUT_DIR" -maxdepth 1 -type f -printf '%f\n' | sort | while read -r name; do
                echo "| \`${name}\` | [raw](${BASE_RAW}/${OUT_DIR}/${name}) | [view](${BASE_BLOB}/${OUT_DIR}/${name}) |"
              done
            else
              echo "| _(no files — run may have failed)_ | | |"
            fi
            echo ""
            echo "### Zip packages"
            echo ""
            echo "| Archive | Raw (direct) | Browse |"
            echo "|---------|--------------|--------|"
            echo "| \`${DATE}.zip\` | [raw](${BASE_RAW}/output/${DATE}.zip) | [view](${BASE_BLOB}/output/${DATE}.zip) |"
            echo "| \`latest.zip\` | [raw](${BASE_RAW}/output/latest.zip) | [view](${BASE_BLOB}/output/latest.zip) |"
          } >> "$GITHUB_STEP_SUMMARY"
